<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fettoosh Bag Shop</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#f5f5f5;
}
header{
    background:#222;
    color:white;
    text-align:center;
    padding:20px;
}
.products{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    padding:20px;
}
.card{
    background:white;
    width:280px;
    margin:15px;
    border-radius:10px;
    overflow:hidden;
    box-shadow:0 0 10px rgba(0,0,0,.2);
}
.card img{
    width:100%;
}
.card h3{
    padding:10px;
}
.card p{
    padding:0 10px 10px;
}
button{
    margin:10px;
    padding:10px 15px;
    background:#000;
    color:white;
    border:none;
    border-radius:5px;
}
footer{
    background:#222;
    color:white;
    text-align:center;
    padding:15px;
}
</style>
</head>

<body>

<header>
<h1>Fettoosh Bag Shop</h1>
<p>Stylish Bags for Everyone</p>
</header>

<div class="products">

<div class="card">
<img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=600" alt="Bag">
<h3>Leather Bag</h3>
<p>Price: Rs. 2,500</p>
<button>Order Now</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1584917865442-de89df76afd3?w=600" alt="Bag">
<h3>Hand Bag</h3>
<p>Price: Rs. 3,200</p>
<button>Order Now</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1594223274512-ad4803739b7c?w=600" alt="Bag">
<h3>Travel Bag</h3>
<p>Price: Rs. 4,500</p>
<button>Order Now</button>
</div>

</div>

<footer>
© 2025 Fettoosh Bag Shop
</footer>

</body>
</html>
